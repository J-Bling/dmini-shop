{% extends "admin/base.html" %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4>分类管理</h4>
    <a href="/admin/categories/create" class="btn btn-success btn-sm"><i class="bi bi-plus-lg"></i> 新增分类</a>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>描述</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in categories %}
                    <tr>
                        <td>{{ c.id }}</td>
                        <td>{{ c.name }}</td>
                        <td>{{ c.description or '-' }}</td>
                        <td>{{ c.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                        <td>
                            <a href="/admin/categories/{{ c.id }}/edit" class="btn btn-outline-primary btn-sm"><i class="bi bi-pencil"></i></a>
                            <form method="post" action="/admin/categories/{{ c.id }}/delete" style="display:inline" onsubmit="return confirm('确定删除「{{ c.name }}」？')">
                                <button class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr><td colspan="5" class="text-center text-muted py-4">暂无分类</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
