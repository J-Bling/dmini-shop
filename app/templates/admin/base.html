<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Mini Shop 后台</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
            background: #1e293b; color: #94a3b8; z-index: 100; padding-top: 1rem;
        }
        .sidebar .nav-link {
            color: #94a3b8; padding: 0.6rem 1.2rem; border-radius: 0;
            font-size: 0.9rem;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff; background: rgba(255,255,255,0.08);
        }
        .sidebar .nav-link i { margin-right: 8px; width: 18px; text-align: center; }
        .sidebar .brand {
            color: #fff; font-weight: 600; font-size: 1.1rem;
            padding: 0.8rem 1.2rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 0.5rem;
        }
        .main-content { margin-left: 220px; padding: 1.5rem 2rem; }
        .page-header { margin-bottom: 1.5rem; }
        .card { border: none; box-shadow: 0 0 10px rgba(0,0,0,0.05); border-radius: 0.5rem; }
        .card-header {
            background: #fff; border-bottom: 1px solid #e9ecef;
            padding: 0.8rem 1.2rem; font-weight: 600;
        }
        .stat-card {
            border-left: 4px solid; border-radius: 0.5rem;
        }
        .stat-card .number { font-size: 1.8rem; font-weight: 700; }
        .stat-card .label { font-size: 0.85rem; color: #6c757d; }
        .badge-status { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
        .footer-bar {
            margin-top: 2rem; padding: 1rem 0;
            color: #94a3b8; font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="brand">
            <i class="bi bi-shop"></i> Mini Shop
        </div>
        <nav class="nav flex-column">
            <a class="nav-link {{ 'active' if active == 'dashboard' else '' }}" href="/admin">
                <i class="bi bi-speedometer2"></i> 控制台
            </a>
            <a class="nav-link {{ 'active' if active == 'products' else '' }}" href="/admin/products">
                <i class="bi bi-box-seam"></i> 商品管理
            </a>
            <a class="nav-link {{ 'active' if active == 'categories' else '' }}" href="/admin/categories">
                <i class="bi bi-tags"></i> 分类管理
            </a>
            <a class="nav-link {{ 'active' if active == 'orders' else '' }}" href="/admin/orders">
                <i class="bi bi-receipt"></i> 订单管理
            </a>
            <a class="nav-link {{ 'active' if active == 'users' else '' }}" href="/admin/users">
                <i class="bi bi-people"></i> 用户管理
            </a>
            <hr style="border-color: rgba(255,255,255,0.08); margin: 0.5rem 1rem;">
            <a class="nav-link" href="/admin/logout">
                <i class="bi bi-box-arrow-left"></i> 退出登录
            </a>
        </nav>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        {% block content %}{% endblock %}
        <div class="footer-bar text-center">Mini Shop 后台管理系统</div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
